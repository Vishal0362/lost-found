<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <div class="max-w-4xl mx-auto p-5">
    <h1 class="text-3xl font-bold mb-5">Lost & Found</h1>

    <!-- Upload Form -->
    <form id="uploadForm" class="bg-white p-4 rounded shadow mb-5">
      <input type="text" id="title" placeholder="Title" class="w-full p-2 border mb-2" required>
      <textarea id="description" placeholder="Description" class="w-full p-2 border mb-2"></textarea>

      <select id="type" class="w-full p-2 border mb-2">
        <option value="lost">Lost</option>
        <option value="found">Found</option>
      </select>

      <input type="file" id="image" class="mb-2" required>

      <button class="bg-blue-500 text-white px-4 py-2">Upload</button>
    </form>

    <!-- Items List -->
    <div id="items" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
  </div>

<script>
const API = "http://localhost:5000/api/items";

// 📤 Upload Item
document.getElementById("uploadForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const button = document.querySelector("button");
  button.disabled = true;

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    button.disabled = false;
    return;
  }

  navigator.geolocation.getCurrentPosition(async (position) => {

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    const formData = new FormData();
    formData.append("title", document.getElementById("title").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("type", document.getElementById("type").value);
    formData.append("lat", lat);
    formData.append("lng", lng);
    formData.append("image", document.getElementById("image").files[0]);

    await fetch(`${API}/upload`, {
      method: "POST",
      body: formData
    });

    alert("Uploaded with location!");
    button.disabled = false;
    loadItems();

  }, () => {
    alert("Location access denied");
    button.disabled = false;
  });
});

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371; // km

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return R * c;
}
</script>

</body>
</html>
